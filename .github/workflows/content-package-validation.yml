name: Content Package Validation

on:
  pull_request:
    paths:
      - 'content-samples/**'
      - 'tools/**'
      - 'tests/**'
      - '.github/workflows/content-package-validation.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate content packages
        run: python3 tools/validate_content_package.py content-samples

      - name: Test ZIP generation
        run: |
          python3 tools/build_autoblog_package.py content-samples/golden-article-001 -o /tmp/dist
          unzip -l /tmp/dist/*.zip
