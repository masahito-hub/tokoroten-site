name: Content Package Validation

on:
  pull_request:
    paths:
      - 'content-samples/**'
      - 'tools/validate_content_package.py'
      - 'tests/test_validate_content_package.py'
      - '.github/workflows/content-package-validation.yml'
  workflow_dispatch:

jobs:
  validate-content-packages:
    name: Validate Content Packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run validator unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate all content-samples packages
        run: python3 tools/validate_content_package.py content-samples
